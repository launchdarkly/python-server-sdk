name: Publish Package
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Is this a dry run? If so no package will be published."
        type: boolean
        required: true
      tag:
        description: 'Tag of an existing draft release to upload artifacts to.'
        type: string
        required: false
      publish_release:
        description: 'Publish (un-draft) the release after all artifacts are uploaded?'
        type: boolean
        required: false
        default: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    # Needed to get tokens during publishing.
    permissions:
      id-token: write
      contents: read
      attestations: write # Needed for artifact attestations
    outputs:
      package-hashes: ${{ steps.build.outputs.package-hashes}}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install poetry
        uses: abatilo/actions-poetry@7b6d33e44b4f08d7021a1dee3c044e9c253d6439 # v3.0.0

      - uses: launchdarkly/gh-actions/actions/release-secrets@release-secrets-v1.2.0
        name: "Get PyPI token"
        with:
          aws_assume_role: ${{ vars.AWS_ROLE_ARN }}
          ssm_parameter_pairs: "/production/common/releasing/pypi/token = PYPI_AUTH_TOKEN"

      - uses: ./.github/actions/build
        id: build

      - name: Publish package distributions to PyPI
        if: ${{ inputs.dry_run == false }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          password: ${{env.PYPI_AUTH_TOKEN}}

      - name: Generate checksums file
        if: ${{ !inputs.dry_run }}
        env:
          HASHES: ${{ steps.build.outputs.package-hashes }}
        run: |
          echo "$HASHES" | base64 -d > checksums.txt

      - name: Attest build provenance
        if: ${{ !inputs.dry_run }}
        uses: actions/attest@v4
        with:
          subject-checksums: checksums.txt

  publish-release:
    needs: ['build-publish']
    if: ${{ !inputs.dry_run && inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
        run: >
          gh release edit "$TAG_NAME"
          --repo ${{ github.repository }}
          --draft=false
